<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ISS 10人滞在デモ</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f5;
      --surface: #ffffff;
      --surface-2: #eef3f4;
      --surface-3: #f8faf7;
      --ink: #1f2a2b;
      --muted: #677574;
      --line: #d7dfdc;
      --tube: #c6d3d0;
      --black: #17211f;
      --teal: #0f766e;
      --cyan: #0891b2;
      --green: #16a34a;
      --amber: #d97706;
      --rose: #e11d48;
      --violet: #7c3aed;
      --blue: #2563eb;
      --orange: #ea580c;
      --shadow: 0 18px 36px rgba(24, 36, 35, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto auto auto;
    }

    .topbar {
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 22px;
      background: rgba(255, 255, 255, 0.9);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(14px);
    }

    .brand {
      display: grid;
      gap: 2px;
      min-width: 220px;
    }

    .brand-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.15;
      font-weight: 850;
    }

    .brand-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(5, minmax(94px, 1fr));
      gap: 8px;
      width: min(720px, 62vw);
    }

    .metric {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 8px 10px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .metric-value {
      margin-top: 3px;
      font-size: 18px;
      line-height: 1.05;
      font-weight: 850;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 22px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      min-width: 0;
    }

    .segmented {
      display: inline-grid;
      grid-auto-flow: column;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface-2);
      flex: none;
    }

    .segmented button {
      min-height: 38px;
      border: 0;
      padding: 0 14px;
      color: var(--muted);
      background: transparent;
      white-space: nowrap;
    }

    .segmented button[aria-pressed="true"] {
      color: #ffffff;
      background: var(--black);
      font-weight: 800;
    }

    .timeline {
      min-width: 220px;
      flex: 1;
      display: grid;
      grid-template-columns: auto auto 1fr auto auto;
      align-items: center;
      gap: 10px;
    }

    .step-chip {
      min-width: 88px;
      display: inline-flex;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: var(--surface-3);
      font-weight: 850;
    }

    .icon-button {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-3);
      color: var(--ink);
      font-weight: 850;
      line-height: 1;
    }

    .icon-button:hover,
    .agent-row:hover,
    .module-row:hover {
      border-color: #9ab1ab;
      background: #f3f7f5;
    }

    .timeline input[type="range"] {
      width: 100%;
      accent-color: var(--teal);
    }

    .conversation-panel {
      margin: 0;
      max-height: 100%;
    }

    .conversation-panel .panel-body {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      grid-template-columns: 1fr;
      gap: 12px;
      align-items: stretch;
      max-height: none;
      overflow: auto;
    }

    .conversation-panel .conversation-list {
      grid-template-columns: 1fr;
      grid-auto-rows: max-content;
      align-content: start;
      align-items: start;
      justify-content: stretch;
      overflow: auto;
      padding-right: 4px;
      max-height: min(520px, calc(100vh - 260px));
      min-height: 0;
    }

    .conversation-controls {
      display: grid;
      gap: 10px;
    }

    .main {
      display: grid;
      grid-template-columns: minmax(500px, 0.95fr) minmax(440px, 0.65fr);
      gap: 14px;
      padding: 14px;
      min-height: 0;
    }

    .right-column {
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr;
      align-self: stretch;
      align-content: start;
      align-items: start;
      gap: 14px;
    }

    .people-row {
      display: grid;
      grid-template-columns: minmax(360px, 0.78fr) minmax(560px, 1.22fr);
      gap: 14px;
      padding: 0 14px 14px;
    }

    .people-row .panel-body {
      max-height: 330px;
    }

    .people-row .agent-list {
      grid-template-columns: repeat(2, minmax(220px, 1fr));
    }

    .operations-row {
      padding: 0 14px 14px;
    }

    .ops-grid {
      display: grid;
      grid-template-columns: minmax(320px, 0.85fr) minmax(260px, 0.55fr) minmax(380px, 1fr);
      gap: 12px;
      align-items: start;
    }

    .ops-block {
      min-width: 0;
    }

    .insight-row {
      display: grid;
      grid-template-columns: minmax(620px, 1.25fr) minmax(360px, 0.75fr);
      gap: 14px;
      padding: 0 14px 14px;
    }

    .event-timeline-body {
      display: grid;
      gap: 12px;
    }

    .event-timeline-rail {
      position: relative;
      height: 104px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(103, 117, 116, 0.14) 1px, transparent 1px),
        linear-gradient(0deg, transparent 31px, rgba(103, 117, 116, 0.14) 32px, transparent 33px, transparent 63px, rgba(103, 117, 116, 0.14) 64px, transparent 65px),
        var(--surface-3);
      background-size: calc(100% / 10) 100%, 100% 100%;
      overflow: hidden;
    }

    .event-marker {
      position: absolute;
      min-width: 10px;
      height: 18px;
      border: 0;
      border-radius: 999px;
      color: #ffffff;
      font-size: 9px;
      font-weight: 900;
      line-height: 1;
      box-shadow: 0 6px 12px rgba(31, 42, 43, 0.16);
    }

    .event-marker.is-baseline {
      top: 12px;
      background: #64748b;
      opacity: 0.34;
    }

    .event-marker.is-nudge {
      top: 12px;
      background: var(--amber);
    }

    .event-marker.is-conflict {
      top: 43px;
      background: var(--rose);
      animation: markerJitter 0.42s steps(2, end) infinite;
    }

    .event-marker.is-repair {
      top: 74px;
      background: var(--green);
    }

    .event-marker.is-current {
      outline: 3px solid rgba(8, 145, 178, 0.24);
      outline-offset: 2px;
    }

    .event-marker.is-past {
      opacity: 0.58;
    }

    .event-current-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--cyan);
      transform: translateX(-1px);
      box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.12);
      pointer-events: none;
    }

    .event-lanes {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }

    .lane-key {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .lane-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--muted);
    }

    .lane-dot.is-nudge {
      background: var(--amber);
    }

    .lane-dot.is-conflict {
      background: var(--rose);
    }

    .lane-dot.is-repair {
      background: var(--green);
    }

    .timeline-focus-list,
    .nudge-effect-list {
      display: grid;
      gap: 8px;
    }

    .timeline-focus-item,
    .nudge-effect-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 10px;
      display: grid;
      gap: 6px;
    }

    .timeline-focus-item.is-nudge,
    .nudge-effect-card.is-active {
      border-color: rgba(217, 119, 6, 0.34);
      background: #fff9ed;
    }

    .timeline-focus-item.is-conflict {
      border-color: rgba(225, 29, 72, 0.34);
      background: #fff1f2;
    }

    .timeline-focus-item.is-repair,
    .nudge-effect-card.is-effective {
      border-color: rgba(22, 163, 74, 0.32);
      background: #f0fdf4;
    }

    .timeline-focus-top,
    .nudge-effect-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
    }

    .timeline-focus-name,
    .nudge-effect-name {
      min-width: 0;
      font-size: 12px;
      line-height: 1.2;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .timeline-focus-step,
    .nudge-effect-status {
      flex: none;
      color: var(--muted);
      font-size: 10px;
      line-height: 1;
      font-weight: 850;
      white-space: nowrap;
    }

    .timeline-focus-text,
    .nudge-effect-text {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .nudge-effect-path {
      margin: 0;
      color: var(--ink);
      font-size: 11px;
      line-height: 1.35;
      font-weight: 800;
    }

    .empty-state {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 12px;
      color: var(--muted);
      background: var(--surface-3);
      font-size: 12px;
      line-height: 1.45;
    }

    @keyframes markerJitter {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-1px);
      }
    }

    .panel {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-3);
    }

    .panel-title {
      margin: 0;
      font-size: 14px;
      font-weight: 850;
      line-height: 1.2;
    }

    .panel-note {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .panel-body {
      min-height: 0;
      overflow: auto;
      padding: 12px;
    }

    .map-panel {
      min-height: 620px;
      background:
        linear-gradient(90deg, rgba(15, 118, 110, 0.04) 1px, transparent 1px),
        linear-gradient(0deg, rgba(15, 118, 110, 0.04) 1px, transparent 1px),
        #fbfcf8;
      background-size: 32px 32px;
    }

    .map-shell {
      position: relative;
      min-height: 460px;
      height: calc(100vh - 310px);
      max-height: 610px;
      border-bottom: 1px solid var(--line);
      overflow: hidden;
      transform: translateZ(0);
    }

    @keyframes impactShake {
      0% { transform: translate(0, 0); }
      12% { transform: translate(-1px, 1px); }
      25% { transform: translate(2px, -1px); }
      38% { transform: translate(-2px, 1px); }
      52% { transform: translate(1px, -2px); }
      66% { transform: translate(-1px, 2px); }
      82% { transform: translate(1px, 1px); }
      100% { transform: translate(0, 0); }
    }

    @keyframes impactFlash {
      0% { opacity: 0; transform: scale(0.98); }
      10% { opacity: 1; transform: scale(1); }
      60% { opacity: 0.18; transform: scale(1.01); }
      100% { opacity: 0; transform: scale(1.03); }
    }

    @keyframes debrisBurst {
      0% { opacity: 0; transform: scale(0.6); }
      12% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.25); }
    }

    @keyframes oxygenPulse {
      0%, 100% { filter: saturate(1); box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.0); }
      50% { filter: saturate(1.25); box-shadow: 0 0 0 10px rgba(225, 29, 72, 0.14); }
    }

    .map-shell.is-impact {
      animation: impactShake 520ms ease-in-out 1;
    }

    .impact-flash {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(circle at 30% 48%, rgba(251, 113, 133, 0.55), rgba(251, 113, 133, 0.0) 58%),
        radial-gradient(circle at 28% 48%, rgba(253, 230, 138, 0.38), rgba(253, 230, 138, 0.0) 62%);
      mix-blend-mode: multiply;
      z-index: 4;
    }

    .impact-flash.is-active {
      animation: impactFlash 1150ms ease-out 1;
    }

    .tube-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .tube {
      stroke: var(--tube);
      stroke-width: 18;
      stroke-linecap: round;
      fill: none;
      opacity: 0.72;
    }

    .tube-core {
      stroke: #f9fbfa;
      stroke-width: 10;
      stroke-linecap: round;
      fill: none;
      opacity: 0.96;
    }

    .module {
      position: absolute;
      border: 1px solid #aebfba;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(232, 239, 237, 0.96)),
        repeating-linear-gradient(90deg, rgba(31, 42, 43, 0.05) 0 1px, transparent 1px 8px);
      box-shadow: 0 10px 22px rgba(24, 36, 35, 0.12);
      overflow: hidden;
    }

    .module::before {
      content: "";
      position: absolute;
      inset: 7px;
      border: 1px dashed rgba(82, 104, 99, 0.32);
      border-radius: 5px;
      pointer-events: none;
    }

    .module.is-hot {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(217, 119, 6, 0.18), 0 12px 24px rgba(24, 36, 35, 0.14);
    }

    .module.is-over {
      border-color: var(--rose);
      box-shadow: 0 0 0 3px rgba(225, 29, 72, 0.2), 0 12px 24px rgba(24, 36, 35, 0.16);
    }

    .module.is-oxygen-danger {
      border-color: rgba(225, 29, 72, 0.68);
      background:
        linear-gradient(135deg, rgba(255, 246, 248, 0.92), rgba(255, 232, 238, 0.92)),
        repeating-linear-gradient(90deg, rgba(225, 29, 72, 0.08) 0 1px, transparent 1px 8px);
      animation: oxygenPulse 1.2s ease-in-out infinite;
    }

    .module.is-oxygen-danger::before {
      border-color: rgba(225, 29, 72, 0.26);
    }

    .module.is-oxygen-danger .module-meta {
      color: rgba(159, 18, 57, 0.96);
    }

    .module-oxygen-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid rgba(225, 29, 72, 0.38);
      background: rgba(255, 241, 244, 0.92);
      color: rgba(159, 18, 57, 0.95);
      font-weight: 900;
      letter-spacing: 0.02em;
      font-size: 11px;
      opacity: 0;
      transform: translateY(-2px);
      transition: opacity 180ms ease, transform 180ms ease;
      white-space: nowrap;
      width: fit-content;
    }

    .module.is-oxygen-danger .module-oxygen-badge {
      opacity: 1;
      transform: translateY(0);
    }

    .module-oxygen-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(225, 29, 72, 0.9);
      box-shadow: 0 0 0 3px rgba(225, 29, 72, 0.14);
    }

    .module-label {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 2px;
      padding: 8px 9px;
    }

    .module-name {
      font-size: 12px;
      font-weight: 850;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .module-meta {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .module-fill {
      position: absolute;
      left: 0;
      bottom: 0;
      height: 4px;
      width: 0;
      background: var(--teal);
      transition: width 260ms ease, background 260ms ease;
    }

    .earth {
      position: absolute;
      left: 43%;
      top: 89%;
      width: 22%;
      aspect-ratio: 3.4 / 1;
      border-radius: 999px 999px 0 0;
      background:
        radial-gradient(circle at 40% 40%, rgba(255,255,255,0.9), transparent 20%),
        linear-gradient(110deg, #23a6d5, #2fbf71 48%, #0c7fb0);
      box-shadow: 0 -10px 28px rgba(8, 145, 178, 0.26);
      opacity: 0.72;
    }

    .nudge {
      position: absolute;
      z-index: 8;
      min-width: 88px;
      min-height: 44px;
      display: none;
      align-items: center;
      gap: 7px;
      justify-content: center;
      transform: translate(-50%, -50%);
      color: var(--ink);
      font-size: 10px;
      font-weight: 850;
      filter: drop-shadow(0 10px 16px rgba(31, 42, 43, 0.22));
      pointer-events: auto;
    }

    .nudge.is-active {
      display: flex;
      animation: nudgeFloat 2.4s ease-in-out infinite;
    }

    .nudge::before {
      content: "";
      position: absolute;
      left: 15px;
      top: 50%;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      transform: translateY(-50%);
      background: rgba(217, 119, 6, 0.22);
      animation: nudgePulse 1.8s ease-out infinite;
    }

    .nudge-object {
      position: relative;
      z-index: 1;
      width: 32px;
      height: 32px;
      flex: 0 0 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 2px solid #ffffff;
      color: #ffffff;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.28), transparent 34%),
        linear-gradient(145deg, #f59e0b, #b45309);
      box-shadow:
        inset -5px -6px 0 rgba(92, 48, 6, 0.18),
        inset 4px 4px 0 rgba(255, 255, 255, 0.18),
        0 8px 18px rgba(31, 42, 43, 0.24);
    }

    .nudge-object::after {
      content: "";
      position: absolute;
      right: -5px;
      bottom: -5px;
      width: 14px;
      height: 14px;
      border-radius: 3px;
      background: rgba(120, 53, 15, 0.28);
      transform: skew(-14deg, -14deg);
      z-index: -1;
    }

    .nudge-code {
      font-size: 12px;
      line-height: 1;
      font-weight: 900;
    }

    .nudge-label {
      position: relative;
      z-index: 1;
      max-width: 72px;
      border: 1px solid rgba(214, 153, 51, 0.62);
      border-radius: 8px;
      background: rgba(255, 250, 239, 0.94);
      padding: 5px 7px;
      color: #65350a;
      line-height: 1.15;
      white-space: normal;
    }

    @keyframes nudgePulse {
      0% {
        opacity: 0.72;
        transform: translateY(-50%) scale(0.72);
      }
      72% {
        opacity: 0;
        transform: translateY(-50%) scale(1.7);
      }
      100% {
        opacity: 0;
        transform: translateY(-50%) scale(1.7);
      }
    }

    @keyframes nudgeFloat {
      0%, 100% {
        transform: translate(-50%, -50%) translateY(0);
      }
      50% {
        transform: translate(-50%, -50%) translateY(-5px);
      }
    }

    .incident-svg {
      position: absolute;
      inset: 0;
      z-index: 11;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    .incident-path {
      fill: none;
      stroke: var(--rose);
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 3 2;
      filter: drop-shadow(0 0 9px rgba(225, 29, 72, 0.52));
      animation: troubleShake 0.34s steps(2, end) infinite, troubleDash 1.1s linear infinite;
    }

    .incident-path.is-caution {
      stroke: var(--amber);
      filter: drop-shadow(0 0 9px rgba(217, 119, 6, 0.54));
    }

    .incident-path.is-repair {
      stroke: var(--green);
      stroke-dasharray: 2 3;
      filter: drop-shadow(0 0 9px rgba(22, 163, 74, 0.48));
      animation: repairGlow 1.5s ease-in-out infinite;
    }

    .incident-label-layer {
      position: absolute;
      inset: 0;
      z-index: 14;
      pointer-events: none;
    }

    .incident-badge {
      position: absolute;
      transform: translate(-50%, -50%);
      min-width: 74px;
      max-width: 132px;
      border: 1px solid rgba(225, 29, 72, 0.38);
      border-radius: 8px;
      background: rgba(255, 241, 242, 0.96);
      color: #8f1232;
      padding: 6px 8px;
      font-size: 10px;
      line-height: 1.2;
      font-weight: 850;
      text-align: center;
      box-shadow: 0 10px 18px rgba(31, 42, 43, 0.14);
      animation: badgePop 0.72s ease-in-out infinite alternate;
    }

    .incident-badge.is-caution {
      border-color: rgba(217, 119, 6, 0.42);
      background: rgba(255, 247, 237, 0.96);
      color: #8a4708;
    }

    .incident-badge.is-repair {
      border-color: rgba(22, 163, 74, 0.34);
      background: rgba(240, 253, 244, 0.96);
      color: #166534;
      animation: none;
    }

    @keyframes troubleShake {
      0%, 100% {
        transform: translate(0, 0);
      }
      50% {
        transform: translate(0.45px, -0.45px);
      }
    }

    @keyframes troubleDash {
      to {
        stroke-dashoffset: -10;
      }
    }

    @keyframes repairGlow {
      0%, 100% {
        opacity: 0.6;
      }
      50% {
        opacity: 1;
      }
    }

    @keyframes badgePop {
      from {
        transform: translate(-50%, -50%) scale(0.96) rotate(-1deg);
      }
      to {
        transform: translate(-50%, -50%) scale(1.04) rotate(1deg);
      }
    }

    .agent-dot {
      position: absolute;
      z-index: 12;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 2px solid #ffffff;
      color: #ffffff;
      font-size: 10px;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(31, 42, 43, 0.24);
      transition: left 360ms ease, top 360ms ease, transform 180ms ease, opacity 180ms ease;
    }

    .agent-dot::after {
      content: "";
      position: absolute;
      right: -4px;
      top: -4px;
      width: 9px;
      height: 9px;
      display: none;
      border: 2px solid #ffffff;
      border-radius: 999px;
      background: var(--rose);
      box-shadow: 0 5px 10px rgba(31, 42, 43, 0.18);
      pointer-events: none;
    }

    .agent-dot.stress-warn {
      outline: 3px solid rgba(217, 119, 6, 0.32);
      outline-offset: 2px;
    }

    .agent-dot.stress-danger {
      outline: 4px solid rgba(225, 29, 72, 0.34);
      outline-offset: 2px;
      animation: stressHalo 1.45s ease-in-out infinite;
    }

    .agent-dot.stress-danger::after {
      display: block;
    }

    @keyframes stressHalo {
      0%, 100% {
        outline-color: rgba(225, 29, 72, 0.28);
      }
      50% {
        outline-color: rgba(225, 29, 72, 0.6);
      }
    }

    .agent-dot.is-muted {
      opacity: 0.38;
    }

    .agent-dot.is-selected {
      transform: scale(1.25);
      box-shadow: 0 0 0 5px rgba(15, 118, 110, 0.2), 0 10px 20px rgba(31, 42, 43, 0.28);
    }

    .agent-dot.is-conflict {
      border-color: #fff1f2;
      box-shadow: 0 0 0 5px rgba(225, 29, 72, 0.22), 0 10px 20px rgba(31, 42, 43, 0.28);
    }

    .legend-strip {
      min-height: 88px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.72);
    }

    .status-tile {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: var(--surface);
      min-width: 0;
    }

    .status-label {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }

    .status-value {
      margin-top: 4px;
      font-size: 15px;
      font-weight: 850;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .agent-list {
      display: grid;
      gap: 8px;
    }

    .agent-row {
      width: 100%;
      min-height: 70px;
      display: grid;
      grid-template-columns: 36px 1fr auto;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 9px;
      text-align: left;
    }

    .agent-row[aria-pressed="true"] {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .avatar {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      color: #ffffff;
      font-size: 11px;
      font-weight: 900;
    }

    .agent-main {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .agent-name {
      font-size: 13px;
      line-height: 1.15;
      font-weight: 850;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .agent-role,
    .agent-place {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stress-pill {
      min-width: 42px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      color: #ffffff;
      font-size: 12px;
      font-weight: 850;
      background: var(--green);
    }

    .stress-pill.warn {
      background: var(--amber);
    }

    .stress-pill.danger {
      background: var(--rose);
    }

    .module-list {
      display: grid;
      gap: 8px;
    }

    .module-row {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      display: grid;
      gap: 7px;
      background: var(--surface);
    }

    .module-row-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
    }

    .module-row-name {
      font-size: 12px;
      font-weight: 850;
      line-height: 1.2;
    }

    .module-count {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .bar {
      height: 7px;
      border-radius: 999px;
      background: var(--surface-2);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: var(--teal);
      transition: width 260ms ease, background 260ms ease;
    }

    .sleep-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
    }

    .berth {
      min-height: 56px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px;
      background: var(--surface);
      display: grid;
      align-content: space-between;
      gap: 3px;
    }

    .berth.is-temp {
      background: #fff8ed;
      border-color: #f2c37b;
    }

    .berth-label {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.1;
    }

    .berth-person {
      font-size: 11px;
      line-height: 1.15;
      font-weight: 850;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .detail-block {
      display: grid;
      gap: 12px;
    }

    .selected-agent {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
    }

    .selected-title {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .selected-name {
      margin: 0;
      font-size: 18px;
      line-height: 1.15;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .selected-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .detail-cell {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: var(--surface-3);
      min-width: 0;
    }

    .detail-label {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }

    .detail-value {
      margin-top: 4px;
      font-size: 14px;
      font-weight: 850;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .log-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: var(--surface-3);
    }

    .log-label {
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .log-text {
      margin: 0;
      font-size: 13px;
      line-height: 1.55;
    }

    .sparkline {
      width: 100%;
      height: 82px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(0deg, transparent 24%, rgba(103,117,116,0.14) 25%, transparent 26%),
        linear-gradient(0deg, transparent 49%, rgba(103,117,116,0.14) 50%, transparent 51%),
        linear-gradient(0deg, transparent 74%, rgba(103,117,116,0.14) 75%, transparent 76%),
        var(--surface);
      overflow: hidden;
    }

    .event-list {
      display: grid;
      gap: 8px;
    }

    .section-label {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      font-weight: 850;
    }

    .conversation-list {
      display: grid;
      gap: 8px;
    }

    .conversation-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface-2);
      margin-bottom: 8px;
    }

    .conversation-tabs button {
      min-height: 32px;
      border: 0;
      border-right: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      white-space: nowrap;
    }

    .conversation-tabs button:last-child {
      border-right: 0;
    }

    .conversation-tabs button[aria-pressed="true"] {
      background: var(--black);
      color: #ffffff;
    }

    .conversation-card {
      position: relative;
      width: 100%;
      align-self: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .conversation-card.is-latest {
      border-color: rgba(8, 145, 178, 0.5);
      background: #f0f9fb;
      box-shadow: inset 4px 0 0 rgba(8, 145, 178, 0.45), 0 8px 18px rgba(8, 145, 178, 0.08);
      animation: conversationEnter 260ms ease-out, conversationGlow 1.35s ease-out;
    }

    .conversation-card.is-latest::after {
      content: "新着";
      position: absolute;
      right: 9px;
      top: -8px;
      border: 1px solid rgba(8, 145, 178, 0.38);
      border-radius: 999px;
      background: #ffffff;
      color: var(--cyan);
      padding: 3px 7px;
      font-size: 10px;
      line-height: 1;
      font-weight: 900;
    }

    .conversation-card.is-trouble {
      border-color: #f4a4b7;
      background: #fff1f2;
    }

    .conversation-card.is-trouble.is-latest {
      border-color: rgba(225, 29, 72, 0.48);
      background: #fff1f2;
      box-shadow: inset 4px 0 0 rgba(225, 29, 72, 0.45), 0 8px 18px rgba(225, 29, 72, 0.08);
    }

    .conversation-card.is-repair {
      border-color: #95d5a6;
      background: #f0fdf4;
    }

    .conversation-card.is-repair.is-latest {
      border-color: rgba(22, 163, 74, 0.42);
      background: #f0fdf4;
      box-shadow: inset 4px 0 0 rgba(22, 163, 74, 0.42), 0 8px 18px rgba(22, 163, 74, 0.08);
      animation: conversationEnter 260ms ease-out, repairConversationPulse 1.8s ease-out;
    }

    .conversation-card.is-mediated {
      border-color: rgba(8, 145, 178, 0.38);
      box-shadow: inset 4px 0 0 rgba(8, 145, 178, 0.28), 0 8px 18px rgba(8, 145, 178, 0.07);
    }

    .conversation-card.is-mediated .conversation-tag {
      background: rgba(8, 145, 178, 0.12);
      color: #0e7490;
    }

    .conversation-card.is-nudge {
      border-color: #e6b460;
      background: #fff9ed;
    }

    .conversation-card.is-nudge.is-latest {
      border-color: rgba(217, 119, 6, 0.42);
      background: #fff9ed;
      box-shadow: inset 4px 0 0 rgba(217, 119, 6, 0.42), 0 8px 18px rgba(217, 119, 6, 0.08);
    }

    @keyframes conversationEnter {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes conversationGlow {
      0% {
        filter: brightness(1.06);
      }
      65% {
        filter: brightness(1.02);
      }
      100% {
        filter: brightness(1);
      }
    }

    @keyframes repairConversationPulse {
      0% {
        filter: brightness(1.08);
        box-shadow: inset 4px 0 0 rgba(22, 163, 74, 0.68), 0 0 0 0 rgba(20, 184, 166, 0.34), 0 10px 22px rgba(22, 163, 74, 0.1);
      }
      58% {
        filter: brightness(1.02);
        box-shadow: inset 4px 0 0 rgba(22, 163, 74, 0.5), 0 0 0 8px rgba(20, 184, 166, 0.08), 0 10px 22px rgba(22, 163, 74, 0.08);
      }
      100% {
        filter: brightness(1);
        box-shadow: inset 4px 0 0 rgba(22, 163, 74, 0.42), 0 8px 18px rgba(22, 163, 74, 0.08);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .conversation-card.is-latest {
        animation: none;
      }
    }

    .conversation-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }

    .conversation-title {
      min-width: 0;
      font-size: 12px;
      line-height: 1.25;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .conversation-tag {
      flex: none;
      border-radius: 999px;
      padding: 3px 7px;
      background: rgba(31, 42, 43, 0.08);
      color: var(--muted);
      font-size: 10px;
      line-height: 1;
      font-weight: 850;
      white-space: nowrap;
    }

    .utterance {
      display: grid;
      gap: 3px;
      border-left: 3px solid rgba(103, 117, 116, 0.3);
      padding-left: 8px;
    }

    .utterance-speaker {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.1;
      font-weight: 850;
    }

    .utterance-text {
      margin: 0;
      font-size: 12px;
      line-height: 1.45;
    }

    .conversation-summary {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .conversation-details {
      color: var(--ink);
      font-size: 12px;
      line-height: 1.5;
    }

    .conversation-details summary {
      width: fit-content;
      color: var(--teal);
      font-weight: 850;
      cursor: pointer;
    }

    .conversation-details p {
      margin: 7px 0 0;
      color: var(--muted);
    }

    .event-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: var(--surface);
    }

    .event-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 5px;
    }

    .event-name {
      font-size: 12px;
      font-weight: 850;
      line-height: 1.2;
    }

    .event-kind {
      color: var(--muted);
      font-size: 10px;
      white-space: nowrap;
    }

    .event-text {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .event-item.is-nudge {
      border-color: #e6b460;
      background: #fff9ed;
    }

    .event-item.is-trouble {
      border-color: #f4a4b7;
      background: #fff1f2;
    }

    .event-item.is-repair {
      border-color: #95d5a6;
      background: #f0fdf4;
    }

    .map-actions {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 18;
      display: flex;
      gap: 8px;
    }

    .map-toggle {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 10px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .map-toggle[aria-pressed="true"] {
      background: var(--teal);
      border-color: var(--teal);
      color: #ffffff;
    }

    @media (max-width: 1180px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .metrics {
        width: 100%;
      }

      .right-column {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .main {
        grid-template-columns: 1fr;
      }

      .people-row {
        grid-template-columns: 1fr;
      }

      .insight-row {
        grid-template-columns: 1fr;
      }

      .ops-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 820px) {
      .metrics {
        grid-template-columns: repeat(2, 1fr);
      }

      .toolbar {
        flex-wrap: wrap;
      }

      .timeline {
        flex-basis: 100%;
      }

      .main {
        grid-template-columns: 1fr;
      }

      .conversation-panel .panel-body {
        grid-template-columns: 1fr;
      }

      .conversation-panel .conversation-list {
        grid-template-columns: 1fr;
      }

      .map-shell {
        height: 500px;
      }

      .right-column {
        display: flex;
        flex-direction: column;
      }

      .people-row {
        grid-template-columns: 1fr;
      }

      .people-row .agent-list {
        grid-template-columns: 1fr;
      }

      .insight-row {
        grid-template-columns: 1fr;
      }

      .event-timeline-rail {
        height: 94px;
      }

      .ops-grid {
        grid-template-columns: 1fr;
      }

      .legend-strip {
        grid-template-columns: repeat(2, 1fr);
      }

      .sleep-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1 class="brand-title">ISS 10人滞在デモ</h1>
        <p class="brand-subtitle">画像なしの状態フレーム / 常設寝床7・仮寝床3 / 100ステップ（Day50デブリ以降の船体・酸素危機を含む）</p>
      </div>
      <div class="metrics" id="metrics"></div>
    </header>

    <section class="toolbar" aria-label="シミュレーション操作">
      <div class="segmented" aria-label="実行条件">
        <button type="button" data-run="a" aria-pressed="false">A：ナッジなし</button>
        <button type="button" data-run="b" aria-pressed="true">B：ナッジあり</button>
      </div>
      <div class="timeline">
        <button type="button" class="icon-button" id="prevButton" aria-label="前のステップ">‹</button>
        <button type="button" class="icon-button" id="playButton" aria-label="再生">▶</button>
        <input id="stepSlider" type="range" min="1" max="100" value="1" aria-label="ステップ">
        <span class="step-chip" id="stepChip">ステップ 1</span>
        <button type="button" class="icon-button" id="nextButton" aria-label="次のステップ">›</button>
      </div>
    </section>

    <main class="main">
      <section class="panel map-panel">
        <div class="panel-header">
          <h2 class="panel-title">ISS状態フレーム</h2>
          <span class="panel-note" id="mapNote">外枠=ストレス注意</span>
        </div>
        <div class="map-shell" id="mapShell">
          <svg class="tube-svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
            <path class="tube" d="M14 48 H31 H48 H66 H83" />
            <path class="tube-core" d="M14 48 H31 H48 H66 H83" />
            <path class="tube" d="M48 48 V75 V87" />
            <path class="tube-core" d="M48 48 V75 V87" />
            <path class="tube" d="M66 48 L83 34" />
            <path class="tube-core" d="M66 48 L83 34" />
            <path class="tube" d="M66 48 L83 62" />
            <path class="tube-core" d="M66 48 L83 62" />
            <path class="tube" d="M48 48 L39 30" />
            <path class="tube-core" d="M48 48 L39 30" />
          </svg>
          <div class="earth" aria-hidden="true"></div>
          <div class="impact-flash" id="impactFlash" aria-hidden="true"></div>
          <div id="moduleLayer"></div>
          <div id="nudgeLayer"></div>
          <svg class="incident-svg" id="incidentSvg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true"></svg>
          <div class="incident-label-layer" id="incidentLabelLayer"></div>
          <div id="agentLayer"></div>
          <div class="map-actions">
            <button type="button" class="map-toggle" id="nudgeToggle" aria-pressed="true">ナッジ</button>
            <button type="button" class="map-toggle" id="calmToggle" aria-pressed="false">注目</button>
          </div>
        </div>
        <div class="legend-strip" id="statusStrip"></div>
      </section>

      <div class="right-column">
        <section class="panel conversation-panel">
          <div class="panel-header">
            <h2 class="panel-title">会話・出来事</h2>
            <span class="panel-note">重要 / 全員 / 選択中</span>
          </div>
          <div class="panel-body">

    function displayModuleId(moduleId, agentId = "", step = currentStep, index = 0) {
      const group = displayModuleGroups[moduleId];
      if (!group) return sourceModuleId(moduleId);
      if (group.length === 1) return group[0];
      const seed = String(agentId || index)
        .split("")
        .reduce((sum, char, charIndex) => sum + char.charCodeAt(0) * (charIndex + 3), 0);

      if (moduleId === "hab_module") {
        return (seed + Number(step) * 5 + index * 7) % 2 === 0 ? "zvezda" : "unity";
      }

      if (moduleId === "lab_module") {
        return group[(seed + Number(step) + index) % group.length];
      }

      if (moduleId === "common_area") {
        return (seed + Number(step) + index) % 6 === 0 ? "unity" : "harmony";
      }

      return group[(seed + Number(step) + index) % group.length];
    }

    function splitIds(value) {
      if (Array.isArray(value)) return value;
      return String(value || "")
        .replace(/[\[\]"']/g, "")
        .split(/[;,]/)
        .map((item) => item.trim())
        .filter(Boolean);
    }

    function parseJsonl(text) {
      return text
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean)
        .map((line) => JSON.parse(line));
    }

    function parseTsv(text) {
      const lines = text.split(/\r?\n/).filter(Boolean);
      const headers = lines.shift()?.split("\t") || [];
      return lines.map((line) => {
        const values = line.split("\t");
        return Object.fromEntries(headers.map((header, index) => [header, values[index] || ""]));
      });
    }

    function cleanDisplayText(value) {
      return String(value ?? "").replace(/\bstress(\d)(\d)\/(\d)(\d)\b/g, "stress $1.$2/$3.$4");
    }

    function escapeHtml(value) {
      const map = {
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      };
      return cleanDisplayText(value).replace(/[&<>"']/g, (char) => map[char]);
    }

    function objectLabel(objectId) {
      if (!objectId) return "";
      const staticNudge = nudges.find((nudge) => nudge.id === objectId);
      if (staticNudge) return staticNudge.name;
      const timelineObject = eventTimelineItems().find((item) => item.id === objectId);
      return timelineObject?.label || objectId;
    }

    function groupBy(rows, keyFn) {
      return rows.reduce((map, row) => {
        const key = keyFn(row);
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(row);
        return map;
      }, new Map());
    }

      return numeric > 10 ? clamp(Math.round(numeric / 10), 2, 10) : clamp(Math.round(numeric), 2, 10);
    }

    async function fetchText(path) {
      const response = await fetch(path, { cache: "no-store" });
      if (!response.ok) throw new Error(`${response.status} ${path}`);
      return response.text();
    }

    async function fetchOptionalText(path) {
      try {
        return await fetchText(path);
      } catch {
        return "";
      }
    }

    async function loadGeneratedRunFromDir(runKey, dir) {
      const [framesText, messagesText, threadsText, timelineText, effectsText] = await Promise.all([
        fetchText(`${dir}/habitat_frames.jsonl`),
        fetchText(`${dir}/messages.jsonl`),
        fetchText(`${dir}/conversation_threads.tsv`),
        fetchOptionalText(`${dir}/event_timeline.tsv`),
        fetchOptionalText(`${dir}/nudge_effects.tsv`)
      ]);
      const frames = parseJsonl(framesText);
      const messages = parseJsonl(messagesText);
      const threads = parseTsv(threadsText);
      const eventTimeline = timelineText ? parseTsv(timelineText) : [];
      const nudgeEffects = effectsText ? parseTsv(effectsText) : [];
      return {
        runKey,
        sourceDir: dir,
        frames,
        eventTimeline,
        nudgeEffects,
        framesByStep: new Map(frames.map((frame) => [Number(frame.step), frame])),
        messagesByConversation: groupBy(messages, (message) => message.conversation_id),
        threadsByStep: groupBy(threads, (thread) => Number(thread.step)),
        maxStep: Math.max(1, ...frames.map((frame) => Number(frame.step) || 0))
      };
    }

    async function loadGeneratedRun(runKey, dirs) {
      const candidates = Array.isArray(dirs) ? dirs : [dirs];
      let lastError = null;
      for (const dir of candidates) {
        try {
          return await loadGeneratedRunFromDir(runKey, dir);
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error(`No generated run directory for ${runKey}`);
    }

    async function loadGeneratedRuns() {
      const entries = Object.entries(generatedRunDirs);
      const results = await Promise.allSettled(
        entries.map(([runKey, dirs]) => loadGeneratedRun(runKey, dirs))
      );
      results.forEach((result, index) => {
        const runKey = entries[index][0];
        if (result.status === "fulfilled") {
          generatedRuns[result.value.runKey] = result.value;
        } else {
          console.error(`Failed to load run ${runKey}:`, result.reason);
        }
      });
      if (generatedRunData()) {
        stepSlider.max = String(maxStep());
        currentStep = clamp(currentStep, 1, maxStep());
      }
    }

    function phaseFor(day) {
      if (day <= 5) return { name: "初期適応", pressure: 0.35 };
      if (day <= 16) return { name: "関係形成", pressure: 0.45 };
      if (day <= 28) return { name: "中盤疲労", pressure: 0.58 };
      if (day <= 44) return { name: "再調整", pressure: 0.52 };
      if (day <= 49) return { name: "帰還準備", pressure: 0.67 };
      if (day === 50) return { name: "デブリ衝突・HAB損傷", pressure: 0.94 };
      if (day <= 55) return { name: "HAB封鎖・地上指示で応急修復", pressure: 0.90 };
      if (day <= 59) return { name: "HAB暫定再開", pressure: 0.76 };
      if (day <= 64) return { name: "HAB酸素漏れ認知", pressure: 0.93 };
      return { name: "LAB酸素低下・生命維持", pressure: 0.97 };
    }

    function deterministic(agentIndex, day, seed) {
      const x = Math.sin((agentIndex + 1) * 12.9898 + day * 78.233 + seed * 19.19) * 43758.5453;
      return x - Math.floor(x);
    }

    function runBoost(day) {
      if (currentRun === "a") return 0;
      let boost = 0;
      if (day >= 6) boost += 0.8;
      if (day >= 11) boost += 0.6;
      if (day >= 18) boost += 0.9;
      if (day >= 24) boost += 0.4;
      if (day >= 28) boost += 0.5;
      return boost;
    }

    function incidentWindow(plan) {
      if (currentRun === "b") {
        return {
          start: plan.start,
          end: plan.runBEnd,
          repairStart: plan.repairStartB,
          repairEnd: plan.repairEndB
        };
      }
      const cap = 100;
      const repairStart = plan.repairStartA != null ? plan.repairStartA : Math.min(cap, plan.end + 1);
      const repairEnd = plan.repairEndA != null ? plan.repairEndA : Math.min(cap, plan.end + 3);
      return {
        start: plan.start,
        end: plan.end,
        repairStart,
        repairEnd
      };
    }

    function incidentStatus(plan, day) {
      const window = incidentWindow(plan);
      if (day >= window.start && day <= window.end) return "active";
      if (day >= window.repairStart && day <= window.repairEnd) return "repair";
      return "";
    }

    function incidentsForDay(day) {
      return incidentPlans
        .map((plan) => ({ ...plan, status: incidentStatus(plan, day) }))
        .filter((plan) => plan.status);
    }

    function incidentForAgent(agentId, day) {
      return incidentsForDay(day).find((incident) => incident.agents.includes(agentId));
    }

    function incidentStressFor(agentId, day) {
      return incidentsForDay(day).reduce((sum, incident) => {
        if (!incident.agents.includes(agentId)) return sum;
        if (incident.status === "repair") return sum + (currentRun === "b" ? 0.15 : 0.55);
        const danger = incident.severity === "danger" ? 1.45 : 0.9;
        return sum + (currentRun === "b" ? danger * 0.82 : danger);
      }, 0);
    }

    function stressFor(agent, index, day) {
      const phase = phaseFor(day);
      const chronic = day * 0.055 + phase.pressure * 2.1;
      const tail = day >= 45 && day <= 49 ? (day - 44) * 0.36 : 0;
      const debrisArc = day >= 50 ? (day - 49) * 0.28 : 0;
      const noise = (deterministic(index, day, 3) - 0.5) * 1.2;
      const relief = runBoost(day) * (agent.privacy >= 8 ? 0.72 : 1);
      const connectorRelief = currentRun === "b" && ["ISS04", "ISS06", "ISS09"].includes(agent.id) ? 0.45 : 0;
      const raw = agent.base + chronic + tail + debrisArc + noise + incidentStressFor(agent.id, day) - relief - connectorRelief;
      return clamp(Math.round(raw), 2, 10);
    }

    function placeFor(agent, index, day) {
      const stress = stressFor(agent, index, day);
      const r = deterministic(index, day, currentRun === "a" ? 7 : 11);
      const incident = incidentForAgent(agent.id, day);

      if (incident && incident.status === "active" && r < 0.86) return incident.module;

      if (day <= 3) {
        return index % 3 === 0 ? "harmony" : index % 3 === 1 ? "crew" : "destiny";
      }
      if (agent.id === "ISS03" && stress >= 8 && r < (currentRun === "b" && day >= 11 ? 0.38 : 0.66)) return "crew";
      if (agent.id === "ISS02" && stress >= 8 && r < (currentRun === "b" && day >= 18 ? 0.42 : 0.58)) return "crew";
      if (agent.id === "ISS05" && r < 0.35) return currentRun === "b" && day >= 6 ? "harmony" : "zvezda";
      if (agent.id === "ISS06" && (day + index) % 4 <= 1) return "tranquility";
      if (agent.id === "ISS04" && r < 0.58) return "harmony";
      if (agent.id === "ISS07" && r < 0.42) return day >= 11 ? "cupola" : "harmony";
      if (agent.id === "ISS09" && r < 0.46) return currentRun === "b" && day >= 11 ? "cupola" : "harmony";
      if (agent.id === "ISS08" && day >= 28 && r < 0.42) return "destiny";
      if (day >= 45 && r < 0.24) return "cupola";
      if (day >= 24 && currentRun === "b" && r > 0.76) return "destiny";

      const cycle = ["harmony", "destiny", "kibo", "columbus", "tranquility", "unity", "zvezda"];
      return cycle[(index + day) % cycle.length];
    }

    function positionInModule(moduleId, agentIndex, day) {
      const module = moduleById[moduleId] || moduleById.harmony;
      const slot = (agentIndex * 7 + day) % 9;
      const cols = 3;
      const row = Math.floor(slot / cols);
      const col = slot % cols;
      const x = module.x + module.w * (0.25 + col * 0.25);
      const y = module.y + module.h * (0.28 + row * 0.23);
      return { x, y };
    }

    function snapshot(day) {
      const frame = generatedFrame(day);
      if (frame) {
        const states = (frame.agent_states || []).map((row, index) => {
          const agent = agentById(row.agent_id) || {
            id: row.agent_id,
            short: String(row.agent_id || "?").slice(-2),
            name: row.name || row.agent_id,
            age: "",
            role: "",
            color: "#64748b",
            anchor: ""
          };
          const module = displayModuleId(row.module_id, row.agent_id, Number(frame.step) || day, index);
          const stress = uiStress(row.stress);
          const mood = row.evaluation || (stress >= 8 ? "危険" : stress >= 6 ? "注意" : stress >= 4 ? "安定" : "回復");
          const sourcePos = { x: Number(row.x), y: Number(row.y) };
          return {
            agent,
            index,
            stress,
            module,
            pos: positionInModule(module, index, Number(frame.step) || day),
            mood,
            sourcePos,
            source: row
          };
        });
        const counts = Object.fromEntries(modules.map((module) => [module.id, 0]));
        states.forEach((state) => { counts[state.module] = (counts[state.module] || 0) + 1; });
        return { states, counts, incidents: activeIncidents(day), frame };
      }

      const states = agents.map((agent, index) => {
        const stress = stressFor(agent, index, day);
        const module = placeFor(agent, index, day);
        const pos = positionInModule(module, index, day);
        const mood = stress >= 8 ? "危険" : stress >= 6 ? "注意" : stress >= 4 ? "安定" : "回復";
        return { agent, index, stress, module, pos, mood };
      });
      const counts = Object.fromEntries(modules.map((module) => [module.id, 0]));
      states.forEach((state) => { counts[state.module] += 1; });
      return { states, counts, incidents: incidentsForDay(day) };
    }

    function activeIncidents(day) {
      const frame = generatedFrame(day);
      if (frame) {
        const eventsById = Object.fromEntries((frame.active_events || []).map((event) => [event.event_id, event]));
        return (frame.active_incidents || []).map((incident) => {
          const event = eventsById[incident.event_id] || {};
          const severity = incident.severity || (incident.status === "repair" ? "repair" : "caution");
          const participants = splitIds(incident.participant_ids);
          return {
            start: Number(frame.step),
            end: Number(frame.step),
            agents: participants,
            module: sourceModuleId(incident.module_id),
            title: incident.label || event.event_name || incident.event_id || "対人摩擦",
            stateLabel: severity === "repair" ? "修復中" : severity === "danger" ? "言い合い" : "すれ違い",
            severity,
            repairNudge: (frame.active_objects || [])[0]?.object_id || "",
            text: event.direction || incident.label || event.event_name || "短い会話の中で距離感を調整している。"
          };
        });
      }

      return incidentsForDay(day).map((incident) => {
        if (incident.status !== "repair") return incident;
        return {
          ...incident,
          severity: "repair",
          stateLabel: "修復中",
          title: `${incident.title}の修復`,
          text: currentRun === "b"
            ? `${incident.repairNudge}がきっかけになり、言い方や距離の取り方を調整している。`
            : "謝るタイミングが遅れ、気まずさを残したまま少しずつ通常運用へ戻る。"
        };
      });
    }

    function incidentEndpoints(from, to, minLength = 11) {
      const dx = to.x - from.x;
      const dy = to.y - from.y;
      const length = Math.hypot(dx, dy);
      if (length >= minLength) return { from, to };
      const midX = (from.x + to.x) / 2;
      const midY = (from.y + to.y) / 2;
      const ux = length > 0.01 ? dx / length : 1;
      const uy = length > 0.01 ? dy / length : 0;
      const half = minLength / 2;
      return {
        from: {
          x: clamp(midX - ux * half, 4, 96),
          y: clamp(midY - uy * half, 4, 96)
        },
        to: {
          x: clamp(midX + ux * half, 4, 96),
          y: clamp(midY + uy * half, 4, 96)
        }
      };
    }

    function zigzagPath(from, to, segments = 14, amplitude = 1.65) {
      const endpoints = incidentEndpoints(from, to);
      const start = endpoints.from;
      const end = endpoints.to;
      const dx = end.x - start.x;
      const dy = end.y - start.y;
      const length = Math.hypot(dx, dy) || 1;
      const nx = -dy / length;
      const ny = dx / length;
      const points = [];
      for (let i = 0; i <= segments; i += 1) {
        const t = i / segments;
        const sign = i === 0 || i === segments ? 0 : (i % 2 === 0 ? 1 : -1);
        points.push({
          x: start.x + dx * t + nx * amplitude * sign,
          y: start.y + dy * t + ny * amplitude * sign
        });
      }
      return points.map((point, index) => `${index === 0 ? "M" : "L"} ${point.x.toFixed(2)} ${point.y.toFixed(2)}`).join(" ");
    }

    function sleepAssignments(day) {
      const frame = generatedFrame(day);
      if (frame?.sleep_assignments) {
        return frame.sleep_assignments.map((slot) => ({
          label: slot.slot_id,
          agentId: slot.agent_id,
          temp: slot.is_temporary === true || slot.is_temporary === "true" || slot.is_temporary === "True"
        }));
      }

      const permanent = ["ISS00", "ISS01", "ISS02", "ISS03", "ISS04", "ISS05", "ISS09"];
      const tempBase = ["ISS06", "ISS07", "ISS08"];
      const rotated = tempBase.slice(day % tempBase.length).concat(tempBase.slice(0, day % tempBase.length));
      return [
        ...permanent.map((agentId, index) => ({ label: `CQ${index + 1}`, agentId, temp: false })),
        { label: "Kibo", agentId: rotated[0], temp: true },
        { label: "Dragon", agentId: rotated[1], temp: true },
        { label: "Airlock", agentId: rotated[2], temp: true }
      ];
    }

    function eventItems(day) {
      const frame = generatedFrame(day);
      if (frame) {
        const activeEvents = (frame.active_events || []).map((event) => ({
          name: event.event_name || event.event_id || "運用イベント",
          kind: event.event_type || event.event_id || "状態",

        }));
        activeIncidents(day).forEach((incident) => {
          activeEvents.push({

            kind: incident.stateLabel,
            trouble: incident.severity !== "repair",
            repair: incident.severity === "repair",

      }

      const phase = phaseFor(day);
      const items = [
        {
          name: phase.name,

          text: day >= 45
            ? "帰還準備で期待と不安が同時に上がる。キューポラと個室の需要が増える。"

              : "共同生活の距離感を探り、食事と作業のリズムが固まり始める。"
        }
      ];
      if (currentRun === "b") {
        nudges.filter((nudge) => day >= nudge.start).forEach((nudge) => {
          items.push({
            name: nudge.name,
            kind: nudge.id,
            nudge: true,
            text: nudge.effect === "一人時間の尊重"
              ? "一人時間を邪魔しない暗黙ルールが強まり、声かけの失敗が減る。"
              : nudge.effect === "声かけ許可"
                ? "話しかけてよい状態が見えるため、キューポラでの短い会話が増える。"
                : nudge.effect === "移動のきっかけ"
                  ? "こもり込みを破る理由が生まれ、実験室と居住側の往復が増える。"
                  : nudge.effect === "協力の可視化"
                    ? "資源節約が個人責任ではなく、全員のチーム達成として見える。"
                    : "写真、レシピ、手紙などが、言葉より先に会話のきっかけになる。"
          });
        });
      }
      activeIncidents(day).forEach((incident) => {
        items.push({
          name: incident.title,
          kind: incident.stateLabel,
          trouble: incident.severity !== "repair",
          repair: incident.severity === "repair",
          text: incident.text
        });
      });
      return items.slice(-6);
    }

    function normalizeTimelineRow(row) {
      const type = row.timeline_type || (row.event_type === "object" ? "nudge" : row.event_type || "baseline");
      return {
        id: row.event_id || row.id || "",
        start: Number(row.start_step || row.start || row.step || 1),
        end: Number(row.end_step || row.end || row.start_step || row.start || 1),
        type,
        eventType: row.event_type || type,
        label: row.label || row.event_name || row.name || row.event_id || "イベント",
        module: sourceModuleId(row.module_id || row.module || ""),
        participantIds: splitIds(row.participant_ids || row.target || ""),
        relatedObjectId: row.related_object_id || row.relatedObjectId || "",
        relatedConflictId: row.related_conflict_id || "",
        intensity: row.intensity || "",
        direction: row.direction || "",
        description: row.description || row.text || ""
      };

    function staticEventTimeline() {
      const items = [];
      if (currentRun === "b") {
        nudges.forEach((nudge) => {
          items.push(normalizeTimelineRow({

            start_step: nudge.start,

            description: `${nudge.name}が${nudge.effect}を促す。`
          }));
        });
      }
      incidentPlans.forEach((plan, index) => {
        const window = incidentWindow(plan);
        items.push(normalizeTimelineRow({
          event_id: `CONF${String(index + 1).padStart(2, "0")}`,
          start_step: window.start,
          end_step: window.end,
          event_type: "conflict",
          timeline_type: "conflict",

          participant_ids: plan.agents.join(";"),
          related_object_id: currentRun === "b" ? plan.repairNudge : "",
          direction: plan.stateLabel,
          description: plan.text
        }));
        items.push(normalizeTimelineRow({
          event_id: `REP${String(index + 1).padStart(2, "0")}`,
          start_step: window.repairStart,
          end_step: window.repairEnd,
          event_type: "repair",
          timeline_type: "repair",
          label: `${plan.title}の修復`,
          module_id: plan.module,
          participant_ids: plan.agents.join(";"),
          related_object_id: currentRun === "b" ? plan.repairNudge : "",
          related_conflict_id: `CONF${String(index + 1).padStart(2, "0")}`,
          direction: currentRun === "b" ? "ナッジ経由で距離再調整" : "時間経過で部分修復",
          description: currentRun === "b"
            ? `${plan.repairNudge}が会話の入口を変え、短い修復を促す。`
            : "ナッジなしで、気まずさを残しながら通常運用へ戻る。"
        }));
      });
      return items;
    }

    function eventTimelineItems() {
      const rows = generatedRunData()?.eventTimeline || [];
      const items = rows.length ? rows.map(normalizeTimelineRow) : staticEventTimeline();
      return items
        .filter((item) => ["nudge", "conflict", "repair"].includes(item.type))
        .sort((a, b) => a.start - b.start || a.end - b.end || a.label.localeCompare(b.label));
    }

    function staticNudgeEffects() {
      if (currentRun !== "b") return [];
      return nudges.map((nudge) => {
        const related = incidentPlans.filter((plan) => plan.repairNudge === nudge.id);
        const repaired = related.filter((plan) => currentStep >= incidentWindow(plan).repairStart);
        const targets = related.map((plan) => plan.title);
        const firstRelated = related[0];
        const path = firstRelated
          ? `S${String(nudge.start).padStart(2, "0")} ${nudge.name} → S${String(firstRelated.start).padStart(2, "0")} ${firstRelated.title} → S${String(incidentWindow(firstRelated).repairStart).padStart(2, "0")} 修復`
          : `S${String(nudge.start).padStart(2, "0")} ${nudge.name}`;
        return {
          objectId: nudge.id,
          objectName: nudge.name,
          start: nudge.start,
          module: nudge.module,
          status: currentStep < nudge.start ? "pending" : repaired.length ? "effective" : "active",
          summary: targets.length
            ? `${targets.join("、")}に接続。${nudge.effect}が会話の入口を変えるかを見る。`
            : `${nudge.effect}を促すための観測中ナッジ。`,
          path,
          affectedAgentIds: [...new Set(related.flatMap((plan) => plan.agents))]
        };
      });
    }

    function nudgeEffectItems() {
      const rows = generatedRunData()?.nudgeEffects || [];
      if (!rows.length) return staticNudgeEffects();
      const timelineById = new Map((generatedRunData()?.eventTimeline || []).map((event) => [event.event_id, event]));
      return rows.map((row) => {
        const start = Number(row.start_step || 1);
        const explicitRepairStep = Number(row.first_repair_step || row.firstRepairStep || "");
        const repairSteps = splitIds(row.repaired_event_ids)
          .map((eventId) => Number(timelineById.get(eventId)?.start_step))
          .filter(Number.isFinite);
        if (Number.isFinite(explicitRepairStep) && explicitRepairStep > 0) repairSteps.push(explicitRepairStep);
        const firstRepairStep = repairSteps.length ? Math.min(...repairSteps) : null;
        const status = currentStep < start
          ? "pending"
          : firstRepairStep !== null && currentStep >= firstRepairStep
          ? "effective"
          : "active";
        return {
          objectId: row.object_id,
          objectName: row.object_name || row.object_id,
          start,
          firstRepairStep,
          module: sourceModuleId(row.module_id || ""),
          status,
          summary: row.effect_summary || "",
          path: row.effect_path || "",
          affectedAgentIds: splitIds(row.affected_agent_ids)
        };
      });
    }

    function pairNames(incident) {

    function routineConversation(day) {
