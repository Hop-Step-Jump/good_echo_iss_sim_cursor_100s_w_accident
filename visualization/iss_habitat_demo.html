        tag: phase,
        tone: "normal",
        utterances: [
          { speaker: "Henri", text: "今日は少し混んでいるね。順番を決めようか。" },
          { speaker: "Linh", text: "じゃあ食事のあと、運動枠を見直しましょう。" }
        ],
        summary: "何でもない調整会話が、後の大きな摩擦を減らす。",
        full: ""
      };
    }

    function allCrewConversations(day) {
      const data = snapshot(day);
      const pairs = [
        ["ISS04", "ISS05"],
        ["ISS09", "ISS01"],
        ["ISS06", "ISS08"],
        ["ISS07", "ISS00"],
        ["ISS02", "ISS03"]
      ];
      const byId = Object.fromEntries(data.states.map((state) => [state.agent.id, state]));
      return pairs.map(([fromId, toId], index) => {
        const from = byId[fromId];
        const to = byId[toId];
        const place = moduleById[from.module].name;
        const sharedPlace = from.module === to.module ? place : `${place} → ${moduleById[to.module].name}`;
        const fromLine = lineForAgent(from, to.agent.name, day, index);
        const toLine = replyForAgent(to, from.agent.name, day, index);
        const stressGap = Math.abs(from.stress - to.stress);
        return {
          title: `${sharedPlace}`,
          tag: stressGap >= 4 ? "温度差" : "全員ログ",
          tone: stressGap >= 4 ? "caution" : "normal",
          utterances: [
            { speaker: from.agent.name, text: fromLine },
            { speaker: to.agent.name, text: toLine }
          ],
          summary: stressGap >= 4
            ? "同じ場所にいても、受け取っている負荷の強さがかなり違う。"
            : "短い確認や雑談が、共同生活の摩擦を小さくしている。",
          full: ""
        };
      });
    }

    function selectedAgentConversations(day) {
      const data = snapshot(day);
      const state = data.states.find((item) => item.agent.id === selectedAgentId);
      const incident = activeIncidents(day).find((item) => item.agents.includes(selectedAgentId));
      if (incident) return [incidentConversation(incident)];

      const partners = state.agent.id === "ISS03"
        ? ["ISS02", "ISS09"]
        : state.agent.id === "ISS05"
          ? ["ISS04", "ISS01"]
          : [state.agent.anchor === "田中" ? "ISS05" : agents.find((agent) => agent.name === state.agent.anchor)?.id || "ISS04", "ISS09"];

      return partners.slice(0, 2).map((partnerId, index) => {
        const partner = data.states.find((item) => item.agent.id === partnerId) || data.states[(state.index + index + 1) % data.states.length];
        return {
          title: `${state.agent.name}の会話`,
          tag: moduleById[state.module].name,
          tone: currentRun === "b" && day >= 6 ? "nudge" : "normal",
          utterances: [
            { speaker: state.agent.name, text: lineForAgent(state, partner.agent.name, day, index + 3) },
            { speaker: partner.agent.name, text: replyForAgent(partner, state.agent.name, day, index + 3) }
          ],
          summary: `${state.agent.name}が、その日の状態に合わせて会話量を調整している。`,
          full: state.stress >= 8
            ? "高ストレス時は、長く話すよりも、相手が会話量を選べる短い問いが効きやすい。"
            : ""
        };
      });
    }

    function lineForAgent(state, partnerName, day, salt) {
      if (state.stress >= 8) {
        return salt % 2 === 0 ? "今日は少し静かにしていたい。" : "大丈夫と言いたいけど、少し疲れている。";
      }
      if (state.module === "harmony") {
        return currentRun === "b" && day >= 6 ? "棚に置いてあったもの、見てもいい？" : "食事の時間、ここで合ってる？";
      }
      if (state.module === "cupola") {
        return currentRun === "b" && day >= 11 ? "この席なら少し話してもいい。" : "地球を見ていると、言葉が少なくなるね。";
      }
      if (state.module === "crew") {
        return currentRun === "b" && day >= 18 ? "マークが出ている間だけ、一人にしてもらえる？" : "少し休んだら戻る。";
      }
      if (state.module === "tranquility") {
        return `${partnerName}、次の運動枠を使う？`;
      }
      return "次の作業、どこまで進める？";
    }

    function replyForAgent(state, partnerName, day, salt) {
      if (state.stress >= 8) {
        return salt % 2 === 0 ? "分かった。必要ならあとで声をかける。" : "無理に話さなくていいよ。";
      }
      if (state.module === "harmony") {
        return "いいよ。短くでも話せると少し落ち着く。";
      }
      if (state.module === "cupola") {
        return "じゃあ、答えなくてもいいから隣にいる。";
      }
      if (state.module === "crew") {
        return "了解。出る時間だけ分かれば待てる。";
      }
      if (state.module === "tranquility") {
        return "あと5分だけ待てる。順番を決めよう。";
      }
      return "そこまでなら一緒にやれる。";
    }

    function generatedConversationItems(day) {
      const data = generatedRunData();
      if (!data) return null;
      let threads = data.threadsByStep.get(Number(day)) || [];
      if (conversationMode === "important") {
        const important = threads.filter((thread) => ["conflict", "repair", "object_mediated"].includes(thread.conversation_type));
        threads = important.length ? important : threads.slice(-1);
      } else if (conversationMode === "selected") {
        threads = threads.filter((thread) => splitIds(thread.participant_ids).includes(selectedAgentId));
      }

      const timelineById = new Map(eventTimelineItems().map((event) => [event.id, event]));
      return threads.map((thread) => {
        const messages = data.messagesByConversation.get(thread.conversation_id) || [];
        const participants = splitIds(thread.participant_ids).map(agentName).join(" × ");
        const moduleName = moduleById[sourceModuleId(thread.module_id)]?.name || thread.module_id || "";
        const conversationType = thread.conversation_type || "routine";
        const timelineEvent = timelineById.get(thread.event_id || "");
        const relatedObjectId = timelineEvent?.relatedObjectId || "";
        const mediatedRepair = conversationType === "repair" && Boolean(relatedObjectId);
        const mediatedLabel = mediatedRepair ? objectLabel(relatedObjectId) : "";
        const tone = conversationType === "repair"
          ? "repair"
          : conversationType === "conflict"
            ? "trouble"
            : conversationType === "object_mediated"
              ? "nudge"
              : "normal";
        const tagParts = [thread.event_id || conversationType];
        if (mediatedLabel) tagParts.push(`ナッジ経由:${mediatedLabel}`);
        if (moduleName) tagParts.push(moduleName);
        return {
          title: thread.summary || participants || moduleName || "会話",
          tag: tagParts.filter(Boolean).join(" / "),
          tone,
          mediated: mediatedRepair,
          utterances: messages.map((message) => ({
            speaker: agentName(message.speaker_id),
            text: message.utterance
          })),
          summary: participants ? `${participants} / ${moduleName}` : moduleName,
          full: thread.detail || ""
        };
      });
    }

    function conversationItems(day) {
      const generated = generatedConversationItems(day);
      if (generated) return generated.slice(-4);

      if (conversationMode === "all") return allCrewConversations(day);
      if (conversationMode === "selected") return selectedAgentConversations(day);
      const incidents = activeIncidents(day).map(incidentConversation);
      const items = [routineConversation(day), ...incidents];
      return items.slice(-4);
    }

    function conversationTimeline(step) {
      const items = [];
      for (let day = 1; day <= step; day += 1) {
        conversationItems(day).forEach((item, index) => {
          items.push({ ...item, step: day, logIndex: index });
        });
      }
      return items;
    }

    function selectedState() {
      return snapshot(currentStep).states.find((state) => state.agent.id === selectedAgentId);
    }

    function agentText(state) {
      const place = moduleById[state.module].name;
      const incident = activeIncidents(currentStep).find((item) => item.agents.includes(state.agent.id));
      if (incident?.severity === "repair") {
        return incident.text;
      }
      if (incident) {
        return `${incident.title}が起きて、${place}で相手の言い方や距離感に強く反応している。`;
      }
      if (state.agent.id === "ISS03") {
        return currentRun === "b" && currentStep >= 11
          ? `キューポラのサインがある日は、${place}で短く話せる可能性が残っている。`
          : `${place}にいても、帰る場所の不確かさが頭から離れない。`;
      }
      if (state.agent.id === "ISS04") {
        return currentRun === "b" && currentStep >= 6
          ? "持ち寄り棚や食事を使って、言葉より先に場を温めようとしている。"
          : "食事の話題で場をつなぐが、自分の疲れは後回しになりやすい。";
      }
      if (state.agent.id === "ISS05") {
        return currentRun === "b" && currentStep >= 18
          ? "個室聖域のルールで、静けさを求めることへの罪悪感が少し下がる。"
          : "静かにしたい気持ちと、孤立したくない気持ちがぶつかっている。";
      }
      if (state.agent.id === "ISS06") {
        return "運動枠は負荷でもあり、自分らしさを保つリズムにもなっている。";
      }
      if (state.agent.id === "ISS08") {
        return currentStep >= 45 ? "帰還後の評価や進路を考え、年長者の言葉を試している。" : "権威への警戒があり、近づきたい相手にも少し距離を置く。";
      }
      return state.stress >= 8
        ? "人の近さと音が重なり、一人で整える時間を探している。"
        : "生活リズムの中で、自分の役割を少しずつ見つけている。";
    }

    function renderModules() {
      moduleLayer.innerHTML = "";
      modules.forEach((module) => {
        const el = document.createElement("div");
        el.className = "module";
        el.id = `module-${module.id}`;
        el.style.left = `${module.x}%`;
        el.style.top = `${module.y}%`;
        el.style.width = `${module.w}%`;
        el.style.height = `${module.h}%`;
        el.innerHTML = `
          <div class="module-label">
            <span class="module-name">${module.name}</span>
            <span class="module-meta">${module.role} / 定員 ${module.cap}</span>
            <span class="module-oxygen-badge" aria-label="酸素警告"><span class="module-oxygen-dot"></span><span class="module-oxygen-text">O2 半分以下</span></span>
          </div>
          <div class="module-fill"></div>
        `;
        moduleLayer.appendChild(el);
      });
    }

    function oxygenDangerForModule(moduleId, step) {
      const frame = generatedFrame(step);
      const oxygenBySource = frame?.module_oxygen || null;
      if (oxygenBySource && typeof oxygenBySource === "object") {
        const source =
          ["zvezda", "unity"].includes(moduleId) ? "hab_module"
          : ["destiny", "kibo", "columbus"].includes(moduleId) ? "lab_module"
          : moduleId === "harmony" ? "common_area"
          : moduleId === "tranquility" ? "exercise_area"
          : moduleId === "crew" ? "crew_quarters"
          : moduleId === "cupola" ? "cupola"
          : "";
        const raw = source ? oxygenBySource[source] : null;
        const value = typeof raw === "number" ? raw : Number(raw);
        if (Number.isFinite(value)) return value < 50;
      }

      // フォールバック（生成データが無い時のUIデモ用）
      const habModules = ["zvezda", "unity"];
      const labModules = ["destiny", "kibo", "columbus"];
      if (step >= 60 && habModules.includes(moduleId)) return true;
      if (step >= 65 && labModules.includes(moduleId)) return true;
      return false;
    }

    function triggerImpactIfNeeded() {
      if (currentStep !== 50) return;
      if (lastImpactStep === currentStep) return;
      lastImpactStep = currentStep;

      mapShell.classList.remove("is-impact");
      impactFlash.classList.remove("is-active");
      // force reflow to restart CSS animations
      void mapShell.offsetWidth;
      mapShell.classList.add("is-impact");
      impactFlash.classList.add("is-active");

      // Debris burst near HAB group (zvezda/unity). Use SVG so it works without images.
      const burstX = 28;
      const burstY = 48;
      const lines = Array.from({ length: 10 }, (_, i) => {
        const a = (Math.PI * 2 * i) / 10;
        const x2 = burstX + Math.cos(a) * 12;
        const y2 = burstY + Math.sin(a) * 9;
        return `<line x1="${burstX}" y1="${burstY}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="rgba(225,29,72,0.55)" stroke-width="0.55" />`;
      }).join("");
      const shards = Array.from({ length: 12 }, (_, i) => {
        const a = (Math.PI * 2 * i) / 12;
        const r = 5 + (i % 3) * 2.5;
        const x = burstX + Math.cos(a) * r;
        const y = burstY + Math.sin(a) * (r * 0.75);
        return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${(0.6 + (i % 4) * 0.18).toFixed(2)}" fill="rgba(253,230,138,0.55)" />`;
      }).join("");
      incidentSvg.innerHTML = `
        <g style="transform-origin:${burstX}px ${burstY}px; animation: debrisBurst 1350ms ease-out 1;">
          <circle cx="${burstX}" cy="${burstY}" r="10" fill="rgba(251,113,133,0.12)"></circle>
          <circle cx="${burstX}" cy="${burstY}" r="6" fill="rgba(225,29,72,0.12)"></circle>
          ${lines}
          ${shards}
        </g>
      `;

      window.setTimeout(() => {
        incidentSvg.innerHTML = "";
        mapShell.classList.remove("is-impact");
        impactFlash.classList.remove("is-active");
      }, 1550);
    }

    function renderNudges() {
      nudgeLayer.innerHTML = "";
      const frameObjects = currentRun === "b" ? (generatedFrame(currentStep)?.active_objects || []) : [];
      const visibleNudges = frameObjects.length
        ? frameObjects.map((object, index) => {
            const staticNudge = nudges.find((nudge) => nudge.id === object.object_id);
            const module = sourceModuleId(object.module_id || staticNudge?.module || "");
            const pos = staticNudge
              ? { x: staticNudge.x, y: staticNudge.y }
              : positionInModule(module, index + 20, currentStep);
            return {
              id: object.object_id,
              code: staticNudge?.code || String(object.object_name || object.object_id || "?").slice(0, 1),
              name: object.object_name || staticNudge?.name || object.object_id,
              x: pos.x,
              y: pos.y
            };
          })
        : currentRun === "b"
        ? nudges.filter((nudge) => currentStep >= nudge.start)
        : [];
      visibleNudges.forEach((nudge) => {
        const el = document.createElement("div");
        el.className = `nudge ${showNudges ? "is-active" : ""}`;
        el.id = `nudge-${nudge.id}`;
        el.style.left = `${nudge.x}%`;
        el.style.top = `${nudge.y}%`;
        el.title = nudge.name;
        el.innerHTML = `
          <span class="nudge-object"><span class="nudge-code">${escapeHtml(nudge.code)}</span></span>
          <span class="nudge-label">${escapeHtml(nudge.name)}</span>
        `;
        nudgeLayer.appendChild(el);
      });
    }

    function renderAgents() {
      agentLayer.innerHTML = "";
      agents.forEach((agent) => {
        const dot = document.createElement("button");
        dot.type = "button";
        dot.className = "agent-dot";
        dot.id = `dot-${agent.id}`;
        dot.style.background = agent.color;
        dot.textContent = agent.short;
        dot.setAttribute("aria-label", agent.name);
        dot.addEventListener("click", () => {
          selectedAgentId = agent.id;
          render();
        });
        agentLayer.appendChild(dot);
      });
    }

    function updateMap(data) {
      triggerImpactIfNeeded();
      modules.forEach((module) => {
        const count = data.counts[module.id] || 0;
        const ratio = count / module.cap;
        const el = document.getElementById(`module-${module.id}`);
        const fill = el.querySelector(".module-fill");
        const oxygenText = el.querySelector(".module-oxygen-text");
        el.classList.toggle("is-hot", ratio >= 0.75 && ratio <= 1);
        el.classList.toggle("is-over", ratio > 1);
        const oxygenDanger = oxygenDangerForModule(module.id, currentStep);
        el.classList.toggle("is-oxygen-danger", oxygenDanger);
        if (oxygenText) {
          const frame = generatedFrame(currentStep);
          const oxygenBySource = frame?.module_oxygen || null;
          const source =
            ["zvezda", "unity"].includes(module.id) ? "hab_module"
            : ["destiny", "kibo", "columbus"].includes(module.id) ? "lab_module"
            : module.id === "harmony" ? "common_area"
            : module.id === "tranquility" ? "exercise_area"
            : module.id === "crew" ? "crew_quarters"
            : module.id === "cupola" ? "cupola"
            : "";
          const raw = oxygenBySource && source ? oxygenBySource[source] : null;
          const value = typeof raw === "number" ? raw : Number(raw);
          oxygenText.textContent = Number.isFinite(value) ? `O2 ${Math.round(value)}%` : "O2 半分以下";
        }
        fill.style.width = `${Math.min(ratio, 1) * 100}%`;
        fill.style.background = ratio > 1 ? "var(--rose)" : ratio >= 0.75 ? "var(--amber)" : "var(--teal)";
      });

      data.states.forEach((state) => {
        const dot = document.getElementById(`dot-${state.agent.id}`);
        const incident = activeIncidents(currentStep).find((item) => item.agents.includes(state.agent.id));
        dot.style.left = `calc(${state.pos.x}% - 14px)`;
        dot.style.top = `calc(${state.pos.y}% - 14px)`;
        dot.classList.toggle("is-selected", state.agent.id === selectedAgentId);
        dot.classList.toggle("is-muted", quietMode && state.stress < 7 && state.agent.id !== selectedAgentId);
        dot.classList.toggle("is-conflict", Boolean(incident && incident.severity !== "repair"));
        dot.classList.toggle("stress-warn", state.stress >= 6 && state.stress < 8);
        dot.classList.toggle("stress-danger", state.stress >= 8);
      });

    }

    function renderIncidents(data) {
      incidentSvg.innerHTML = "";
      incidentLabelLayer.innerHTML = "";
      const stateByAgent = Object.fromEntries(data.states.map((state) => [state.agent.id, state]));
      activeIncidents(currentStep).forEach((incident) => {
        const from = stateByAgent[incident.agents[0]];
        const to = stateByAgent[incident.agents[1]];
        if (!from || !to) return;

        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", zigzagPath(from.pos, to.pos));
        path.setAttribute("class", `incident-path is-${incident.severity === "danger" ? "danger" : incident.severity}`);
        path.setAttribute("vector-effect", "non-scaling-stroke");
        incidentSvg.appendChild(path);

        const label = document.createElement("div");
        label.className = `incident-badge is-${incident.severity === "danger" ? "danger" : incident.severity}`;
        label.style.left = `${(from.pos.x + to.pos.x) / 2}%`;
        label.style.top = `${(from.pos.y + to.pos.y) / 2}%`;
        label.textContent = `${incident.stateLabel}：${incident.title}`;
        incidentLabelLayer.appendChild(label);
      });
    }

    function renderAgentList(data) {
      agentList.innerHTML = "";
      data.states
        .slice()
        .sort((a, b) => b.stress - a.stress)
        .forEach((state) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "agent-row";
          button.setAttribute("aria-pressed", state.agent.id === selectedAgentId ? "true" : "false");
          button.innerHTML = `
            <span class="avatar" style="background:${state.agent.color}">${escapeHtml(state.agent.short)}</span>
            <span class="agent-main">
              <span class="agent-name">${escapeHtml(state.agent.name)}</span>
              <span class="agent-role">${escapeHtml(state.agent.role)}</span>
              <span class="agent-place">${escapeHtml(moduleById[state.module].name)}</span>
            </span>
            <span class="stress-pill ${state.stress >= 8 ? "danger" : state.stress >= 6 ? "warn" : ""}">${state.stress}</span>
          `;
          button.addEventListener("click", () => {
            selectedAgentId = state.agent.id;
            render();
          });
          agentList.appendChild(button);
        });
    }

    function renderMetrics(data) {
      const frame = generatedFrame(currentStep);
      if (frame?.metrics) {
        const values = [
          ["平均ストレス", uiStress(frame.metrics.average_stress).toFixed(1)],
          ["摩擦", frame.metrics.conflict_count ?? 0],
          ["孤立気味", frame.metrics.isolated_agents ?? 0],
          ["修復率", `${frame.metrics.repair_rate ?? 0}%`],
          ["個室待ち", frame.metrics.private_room_wait ?? 0]
        ];
        metrics.innerHTML = values.map(([label, value]) => `
          <div class="metric">
            <div class="metric-label">${label}</div>
            <div class="metric-value">${value}</div>
          </div>
        `).join("");
        return;
      }

      const avgStress = data.states.reduce((sum, state) => sum + state.stress, 0) / data.states.length;
      const isolated = data.states.filter((state) => state.module === "crew" && state.stress >= 7).length;
      const cupolaCount = data.counts.cupola || 0;
      const friction = activeIncidents(currentStep).filter((incident) => incident.severity !== "repair").length;
      const repairing = activeIncidents(currentStep).filter((incident) => incident.severity === "repair").length;
      const repair = currentRun === "b"
        ? clamp(Math.round(38 + runBoost(currentStep) * 7 - isolated * 5 - friction * 7 + repairing * 4 + cupolaCount * 2), 20, 82)
        : clamp(Math.round(28 - isolated * 4 - friction * 8 + repairing * 2 + cupolaCount), 8, 46);
      const privacyWait = Math.max(0, data.counts.crew - moduleById.crew.cap);
      const values = [
        ["平均ストレス", avgStress.toFixed(1)],
        ["摩擦", friction],
        ["孤立気味", isolated],
        ["修復率", `${repair}%`],
        ["個室待ち", privacyWait]
      ];
      metrics.innerHTML = values.map(([label, value]) => `
        <div class="metric">
          <div class="metric-label">${label}</div>
          <div class="metric-value">${value}</div>
        </div>
      `).join("");
    }

    function renderStatusStrip(data) {
      const crowded = modules
        .map((module) => ({ module, count: data.counts[module.id] || 0, ratio: (data.counts[module.id] || 0) / module.cap }))
        .sort((a, b) => b.ratio - a.ratio)[0];
      const high = data.states.filter((state) => state.stress >= 8).map((state) => state.agent.name).slice(0, 3).join("、") || "なし";
      const frictionText = activeIncidents(currentStep)
        .map((incident) => `${incident.stateLabel}:${incident.agents.map(agentName).join("・")}`)
        .join(" / ") || "なし";
      const runText = `${currentRun === "b" ? "B：ナッジあり" : "A：ナッジなし"} / ${generatedRunData() ? "生成データ" : "デモ"}`;
      statusStrip.innerHTML = [
        ["実行条件", runText],
        ["混雑", `${crowded.module.name} ${crowded.count}/${crowded.module.cap}`],
        ["摩擦", frictionText],
        ["高ストレス", high]
      ].map(([label, value]) => `
        <div class="status-tile">
          <div class="status-label">${escapeHtml(label)}</div>
          <div class="status-value">${escapeHtml(value)}</div>
        </div>
      `).join("");
    }

    function renderDetail() {
      const state = selectedState();
      const agent = state.agent;
      const generated = generatedRunData();
      const history = generated
        ? Array.from({ length: generated.maxStep }, (_, index) => {
            const frame = generated.framesByStep.get(index + 1);
            const sourceState = (frame?.agent_states || []).find((item) => item.agent_id === agent.id);
            return sourceState ? uiStress(sourceState.stress) : state.stress;
          })
        : Array.from({ length: 50 }, (_, index) => {
            const day = index + 1;
            return stressFor(agent, state.index, day);
          });
      const points = history.map((value, index) => {
        const x = 4 + index * (92 / Math.max(history.length - 1, 1));
        const y = 76 - ((value - 2) / 8) * 68;
        return `${x},${y}`;
      }).join(" ");
      const emotionSummary = state.source?.emotion_summary || agentText(state);
      const emotionDetail = state.source?.emotion_detail || "";
      const actionSummary = state.source?.action_summary || actionText(state);
      const actionDetail = state.source?.action_detail || "";
      detailPanel.innerHTML = `
        <div class="selected-agent">
          <span class="avatar" style="background:${agent.color}">${escapeHtml(agent.short)}</span>
          <div class="selected-title">
            <h3 class="selected-name">${escapeHtml(agent.name)}</h3>
            <div class="selected-meta">${escapeHtml(agent.age)}歳 / ${escapeHtml(agent.role)} / 接点: ${escapeHtml(agent.anchor)}</div>
          </div>
        </div>
        <div class="detail-grid">
          <div class="detail-cell">
            <div class="detail-label">居場所</div>
            <div class="detail-value">${escapeHtml(moduleById[state.module].name)}</div>
          </div>
          <div class="detail-cell">
            <div class="detail-label">ストレス</div>
            <div class="detail-value">${state.stress}/10</div>
          </div>
          <div class="detail-cell">
            <div class="detail-label">状態</div>
            <div class="detail-value">${escapeHtml(state.mood)}</div>
          </div>
        </div>
        <svg class="sparkline" viewBox="0 0 100 82" preserveAspectRatio="none" aria-label="ストレス推移">
          <polyline points="${points}" fill="none" stroke="${agent.color}" stroke-width="2.6" vector-effect="non-scaling-stroke"></polyline>
          <circle cx="${4 + (currentStep - 1) * (92 / Math.max(history.length - 1, 1))}" cy="${76 - ((state.stress - 2) / 8) * 68}" r="2.6" fill="${agent.color}"></circle>
        </svg>
        <div class="log-box">
          <div class="log-label">内面</div>
          <p class="log-text">${escapeHtml(emotionSummary)}</p>
          ${emotionDetail ? `
            <details class="conversation-details">
              <summary>詳しく見る</summary>
              <p>${escapeHtml(emotionDetail)}</p>
            </details>
          ` : ""}
        </div>
        <div class="log-box">
          <div class="log-label">行動</div>
          <p class="log-text">${escapeHtml(actionSummary)}</p>
          ${actionDetail ? `
            <details class="conversation-details">
              <summary>詳しく見る</summary>
              <p>${escapeHtml(actionDetail)}</p>
            </details>
          ` : ""}
        </div>
      `;
    }

    function actionText(state) {
      const incident = activeIncidents(currentStep).find((item) => item.agents.includes(state.agent.id));
      if (incident?.severity === "repair") {
        return currentRun === "b"
          ? "相手へ直接踏み込みすぎず、場に置かれたサインや棚を使って修復の糸口を作る。"
          : "距離を取りながら、次の共同作業で普通に戻るタイミングを探す。";
      }
      if (incident) return "その場で言い返すか黙るか迷い、会話を短く切って距離を取る。";
      if (state.module === "cupola") return "地球を見る時間を取り、近くにいる相手との短い会話を試す。";
      if (state.module === "crew") return "一人で整える時間を確保し、次の共同作業に戻る準備をする。";
      if (state.module === "tranquility") return "運動枠を使い、身体のリズムから心理状態を立て直す。";
      if (state.module === "harmony") return "食事、棚、スコア表示のまわりでゆるい接点を持つ。";
      if (state.module === "destiny" || state.module === "kibo" || state.module === "columbus") return "割り当て作業に入り、役割を通じて自己効力感を保つ。";
      return "人の流れを見ながら、必要なら共用部へ戻る。";
    }

    function timelineTypeLabel(type) {
      if (type === "nudge") return "ナッジ";
      if (type === "conflict") return "摩擦";
      if (type === "repair") return "修復";
      return "状態";
    }

    function renderEventTimeline() {
      const items = eventTimelineItems();
      const max = Math.max(2, maxStep());
      const currentLeft = ((currentStep - 1) / (max - 1)) * 100;
      const markerHtml = items.map((item) => {
        const left = ((item.start - 1) / (max - 1)) * 100;
        const width = Math.max(2.4, ((Math.max(item.end, item.start) - item.start + 1) / max) * 100);
        const active = currentStep >= item.start && currentStep <= item.end;
        const past = currentStep > item.end;
        const label = escapeHtml(item.label);
        const typeLabel = escapeHtml(timelineTypeLabel(item.type));
        return `
          <button
            type="button"
            class="event-marker is-${item.type} ${active ? "is-current" : ""} ${past ? "is-past" : ""}"
            data-step="${item.start}"
            style="left:${left}%;width:${width}%"
            title="S${String(item.start).padStart(2, "0")} ${typeLabel}：${label}"
            aria-label="S${item.start} ${label}"
          >${item.type === "nudge" ? "N" : item.type === "repair" ? "R" : "!"}</button>
        `;
      }).join("");
      eventTimelineRail.innerHTML = `${markerHtml}<div class="event-current-line" style="left:${currentLeft}%"></div>`;
      eventTimelineRail.querySelectorAll("[data-step]").forEach((button) => {
        button.addEventListener("click", () => setStep(button.dataset.step));
      });

      const priority = { conflict: 0, repair: 1, nudge: 2 };
      const active = items
        .filter((item) => currentStep >= item.start && currentStep <= item.end)
        .sort((a, b) => (priority[a.type] ?? 3) - (priority[b.type] ?? 3) || a.start - b.start);
      const next = items.find((item) => item.start > currentStep);
      const focusItems = (active.length ? active : next ? [next] : items.slice(-1)).slice(0, 4);
      timelineFocusList.innerHTML = focusItems.length ? focusItems.map((item) => `
        <div class="timeline-focus-item is-${item.type}">
          <div class="timeline-focus-top">
            <span class="timeline-focus-name">${escapeHtml(item.label)}</span>
            <span class="timeline-focus-step">S${String(item.start).padStart(2, "0")}${item.end !== item.start ? `-${String(item.end).padStart(2, "0")}` : ""} / ${escapeHtml(timelineTypeLabel(item.type))}</span>
          </div>
          <p class="timeline-focus-text">${escapeHtml(item.description || item.direction || moduleById[item.module]?.name || "")}</p>
        </div>
      `).join("") : `<div class="empty-state">表示できるイベントがまだありません。</div>`;
    }

    function renderNudgeEffects() {
      const items = nudgeEffectItems();
      if (currentRun !== "b" && !items.length) {
        nudgeEffectList.innerHTML = `<div class="empty-state">Run Aはナッジなしの比較条件です。Bへ切り替えると効果トレースを確認できます。</div>`;
        return;
      }
      nudgeEffectList.innerHTML = items.map((item) => {
        const statusText = item.status === "pending" ? "待機" : item.status === "effective" ? "効果確認" : "観測中";
        const repairStepText = item.status === "effective" && item.firstRepairStep
          ? ` / S${String(item.firstRepairStep).padStart(2, "0")}確認`
          : "";
        const agentText = item.affectedAgentIds?.length
          ? `関係者: ${item.affectedAgentIds.map(agentName).join("、")}`
          : moduleById[item.module]?.name || "";
        return `
          <div class="nudge-effect-card ${item.status === "effective" ? "is-effective" : item.status === "active" ? "is-active" : ""}">
            <div class="nudge-effect-top">
              <span class="nudge-effect-name">${escapeHtml(item.objectName)}</span>
              <span class="nudge-effect-status">S${String(item.start).padStart(2, "0")} / ${escapeHtml(statusText)}${repairStepText}</span>
            </div>
            <p class="nudge-effect-text">${escapeHtml(item.summary)}</p>
            <p class="nudge-effect-path">${escapeHtml(item.path)}</p>
            <p class="nudge-effect-text">${escapeHtml(agentText)}</p>
          </div>
        `;
      }).join("") || `<div class="empty-state">この実行ではナッジ効果データがありません。</div>`;
    }

    function renderOperations(data) {
      conversationLead.textContent = conversationLeadText(currentStep);
      conversationList.innerHTML = conversationTimeline(currentStep).map((item) => {
        const toneClass = item.tone === "trouble" ? "is-trouble" : item.tone === "repair" ? "is-repair" : item.tone === "nudge" ? "is-nudge" : "";
        const classes = ["conversation-card", toneClass, item.mediated ? "is-mediated" : "", item.step === currentStep ? "is-latest" : ""].filter(Boolean).join(" ");
        return `
        <div class="${classes}">
          <div class="conversation-top">
            <span class="conversation-title">${escapeHtml(item.title)}</span>
            <span class="conversation-tag">S${String(item.step).padStart(2, "0")} / ${escapeHtml(item.tag)}</span>
          </div>
          ${item.utterances.map((utterance) => `
            <div class="utterance">
              <div class="utterance-speaker">${escapeHtml(utterance.speaker)}</div>
              <p class="utterance-text">「${escapeHtml(utterance.text)}」</p>
            </div>
          `).join("")}
          <p class="conversation-summary">${escapeHtml(item.summary)}</p>
          ${item.full ? `
            <details class="conversation-details">
              <summary>詳しく見る</summary>
              <p>${escapeHtml(item.full)}</p>
            </details>
          ` : ""}
        </div>
      `;
      }).join("");
      scrollConversationToLatest();

      moduleList.innerHTML = modules.map((module) => {
        const count = data.counts[module.id] || 0;
        const ratio = count / module.cap;
        const fillColor = ratio > 1 ? "var(--rose)" : ratio >= 0.75 ? "var(--amber)" : "var(--teal)";
        return `
          <div class="module-row">
            <div class="module-row-top">
              <span class="module-row-name">${escapeHtml(module.name)}</span>
              <span class="module-count">${count}/${module.cap}</span>
            </div>
            <div class="bar"><div class="bar-fill" style="width:${Math.min(ratio, 1) * 100}%;background:${fillColor}"></div></div>
          </div>
        `;
      }).join("");

      sleepGrid.innerHTML = sleepAssignments(currentStep).map((slot) => {
        const agent = agentById(slot.agentId);
        return `
          <div class="berth ${slot.temp ? "is-temp" : ""}">
            <div class="berth-label">${escapeHtml(slot.label)}${slot.temp ? " 仮" : ""}</div>
            <div class="berth-person">${escapeHtml(agent?.name || slot.agentId)}</div>
          </div>
        `;
      }).join("");

      eventList.innerHTML = eventItems(currentStep).map((item) => `
        <div class="event-item ${item.repair ? "is-repair" : item.trouble ? "is-trouble" : item.nudge ? "is-nudge" : ""}">
          <div class="event-top">
            <span class="event-name">${escapeHtml(item.name)}</span>
            <span class="event-kind">${escapeHtml(item.kind)}</span>
          </div>
          <p class="event-text">${escapeHtml(item.text)}</p>
        </div>
      `).join("");
    }

    function scrollConversationToLatest() {
      window.requestAnimationFrame(() => {
        const latest = conversationList.querySelector(".conversation-card.is-latest:last-child") || conversationList.lastElementChild;
        if (!latest) return;
        const behavior = playing ? "smooth" : "auto";
        conversationList.scrollTo({ top: conversationList.scrollHeight, behavior });
      });
    }

    function conversationLeadText(day) {
      const active = activeIncidents(day);
      const trouble = active.find((incident) => incident.severity !== "repair");
      if (trouble) {
        return `${trouble.stateLabel}が発生中：${trouble.title}。当事者の発話と、その後の距離の取り方を見る。`;
      }

      const repair = active.find((incident) => incident.severity === "repair");
      if (repair) {
        return `修復中：${repair.title}。ナッジ後に会話が短く戻るか、長く続くかを見る。`;
      }

      const frame = generatedFrame(day);
      const activeNudge = frame?.active_objects?.length
        ? frame.active_objects.slice(-1)[0]
        : currentRun === "b"
        ? nudges.filter((nudge) => day >= nudge.start).slice(-1)[0]
        : null;
      if (activeNudge) {
        return `ナッジ稼働中：${activeNudge.name || activeNudge.object_name}。偶然の声かけと、一人時間の保護を確認する。`;
      }

      return "通常運転：食事・作業・一人時間の短い会話を確認する。";
    }

    function renderRunButtons() {
      document.querySelectorAll("[data-run]").forEach((button) => {
        button.setAttribute("aria-pressed", button.dataset.run === currentRun ? "true" : "false");
      });
      document.querySelectorAll("[data-conversation-tab]").forEach((button) => {
        button.setAttribute("aria-pressed", button.dataset.conversationTab === conversationMode ? "true" : "false");
      });
      const sourceLabel = generatedRunData() ? "生成データ" : "デモ";
      selectedRunLabel.textContent = `${currentRun === "b" ? "B：ナッジあり" : "A：ナッジなし"} / ${sourceLabel}`;
    }

    function render() {
      const data = snapshot(currentStep);
      stepSlider.max = String(maxStep());
      stepSlider.value = String(currentStep);
      stepChip.textContent = `ステップ ${currentStep}`;
      phaseLabel.textContent = data.frame?.phase || phaseFor(currentStep).name;
      renderRunButtons();
      updateMap(data);
      renderNudges();
      renderIncidents(data);
      renderAgentList(data);
      renderMetrics(data);
      renderStatusStrip(data);
      renderDetail();
      renderEventTimeline();
      renderNudgeEffects();
      renderOperations(data);
      nudgeToggle.setAttribute("aria-pressed", showNudges ? "true" : "false");
      calmToggle.setAttribute("aria-pressed", quietMode ? "true" : "false");
    }

    function setStep(value) {
      currentStep = clamp(Number(value), 1, maxStep());
      render();
    }

    function setPlaying(next) {
      playing = next;
      playButton.textContent = playing ? "Ⅱ" : "▶";
      if (timer) window.clearInterval(timer);
      timer = null;
      if (playing) {
        timer = window.setInterval(() => {
          currentStep = currentStep >= maxStep() ? 1 : currentStep + 1;
          render();
        }, 900);
      }
    }

    document.querySelectorAll("[data-run]").forEach((button) => {
      button.addEventListener("click", () => {
        currentRun = button.dataset.run;
        render();
      });
    });

    document.querySelectorAll("[data-conversation-tab]").forEach((button) => {
      button.addEventListener("click", () => {
        conversationMode = button.dataset.conversationTab;
        render();
      });
    });

    stepSlider.addEventListener("input", (event) => setStep(event.target.value));
    document.getElementById("prevButton").addEventListener("click", () => setStep(currentStep - 1));
    document.getElementById("nextButton").addEventListener("click", () => setStep(currentStep + 1));
    playButton.addEventListener("click", () => setPlaying(!playing));
    nudgeToggle.addEventListener("click", () => {
      showNudges = !showNudges;
      render();
    });
    calmToggle.addEventListener("click", () => {
      quietMode = !quietMode;
      render();
    });

    (async () => {
      renderModules();
      renderNudges();
      renderAgents();
      await loadGeneratedRuns();
      render();
    })();
  </script>
</body>
</html>
